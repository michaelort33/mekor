<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Pesach">
  <defs>
    <clipPath id="favicon-round">
      <rect width="32" height="32" rx="6" ry="6" />
    </clipPath>
  </defs>
  <g clip-path="url(#favicon-round)">
    <image
      href="/favicon-matzah-bg.jpg"
      width="32"
      height="32"
      preserveAspectRatio="xMidYMid slice"
    />
  </g>
  <text
    x="16"
    y="16"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="17"
    font-weight="700"
    fill="#2a1f14"
    stroke="#f8f3ea"
    stroke-width="0.6"
    paint-order="stroke fill"
  >P</text>
</svg>
